# Example workspace configuration
# Copy this file to ~/.zsh-workscene.yaml and customize

workspaces:
  research:
    description: Research agent dev environment
    env:
      NODE_ENV: development
    tabs:
      - name: claude
        dir: ~/projects/research
        cmd: claude
        split:
          - direction: vertical
            dir: ~/projects/research
    editor:
      type: vscode
      path: ~/projects/research

